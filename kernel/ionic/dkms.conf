# DKMS configuration for ionic eth+RDMA (rocm-xio)
#
# Two modules:
#   ionic.ko      - patched ethernet driver with
#                   RDMA auxiliary device support
#   ionic_rdma.ko - InfiniBand RDMA driver
#
# SPDX-License-Identifier: GPL-2.0

PACKAGE_NAME="rocm-xio-ionic-eth-rdma"
PACKAGE_VERSION="1.0.0"

BUILT_MODULE_NAME[0]="ionic"
DEST_MODULE_LOCATION[0]="/updates/dkms"

BUILT_MODULE_NAME[1]="ionic_rdma"
BUILT_MODULE_LOCATION[1]="rdma"
DEST_MODULE_LOCATION[1]="/updates/dkms"

AUTOINSTALL="yes"

MAKE="make -C ${kernel_source_dir} \
  M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build \
  modules"

CLEAN="make -C ${kernel_source_dir} \
  M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build \
  clean"
