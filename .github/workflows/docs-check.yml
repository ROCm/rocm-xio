name: docs-check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - 'feat/**'
    paths:
      - 'docs/**'
      - 'cmake/XIODocumentation.cmake'
      - 'requirements.txt'
      - '.readthedocs.yaml'
      - 'src/**/*.h'
      - 'README.md'
      - '.codespellrc'
      - '.github/workflows/docs-check.yml'

jobs:
  sphinx:
    name: sphinx-build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@v5.0.0
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake doxygen python3-venv
        python -m pip install -r docs/sphinx/requirements.txt
    - name: Configure docs-only build
      run: |
        cmake -S . -B build \
          -DXIO_DOCS_ONLY=ON \
          -DXIO_BUILD_DOCS=ON
    - name: Build documentation
      run: cmake --build build --target sphinx-html

  codespell:
    name: codespell
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@v5.0.0
    - name: Install codespell
      run: python -m pip install codespell
    - name: Run codespell
      run: codespell

  rst-lint:
    name: rst-lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@v5.0.0
    - name: Install doc8
      run: python -m pip install doc8
    - name: Lint RST files
      run: >
        doc8 docs/ --max-line-length 80
        --ignore-path docs/sphinx/requirements.txt
