# Deploy Sphinx documentation to GitHub Pages.
#
# Prerequisites (one-time, requires repo-admin access):
#   Settings > Pages > Source = "GitHub Actions"

name: docs-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'cmake/XIODocumentation.cmake'
      - 'src/**/*.h'
      - 'requirements.txt'
      - '.github/workflows/docs-deploy.yml'

permissions:
  contents: read

jobs:
  build:
    name: sphinx-build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v5.0.0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake doxygen
        pip install -r requirements.txt

    - name: Configure docs-only build
      run: |
        cmake -S . -B build \
          -DXIO_DOCS_ONLY=ON \
          -DXIO_BUILD_DOCS=ON

    - name: Build documentation
      run: cmake --build build --target sphinx-html

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/docs/html

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
