name: spell-check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '**.md'
      - '.wordlist.txt'
      - '.spellcheck.yaml'

jobs:
  spell-check:
    name: spell-check for rocm-axiio
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@v5.0.0
    - name: GitHub Spellcheck Action
      uses: rojopolis/spellcheck-github-actions@0.52.0
