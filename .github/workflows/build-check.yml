name: build-check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '**.hip'
      - '**.cpp'
      - '**.h'
      - Makefile

jobs:
  build-check:
    name: build-check for rocm-axiio
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@v5.0.0
    - name: Install rocm
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          expect \
          hipcc \
          libcli11-dev \
          libstdc++-14-dev
    - name: List supported GPUs.
      run: |
        make list
      env:
        CLANGXX: /usr/bin/clang++
    - name: Compile code.
      run: |
        mkdir bin
        mkdir lib
        make CXXFLAGS+="--offload-arch=gfx942:xnack+" all
      env:
        HIPCXX: /usr/bin/hipcc
        HIP_INCLUDE_DIR: /usr/include
    - name: Run tester application.
      run: |
        ./bin/axiio-tester -h
    - name: Perform clang linting.
      uses: DoozyX/clang-format-lint-action@v0.18.2
      with:
        source: '.'
        exclude: './build ./stebates-*'
        extensions: 'cpp,h,hpp,c,cc,hip'
        clangFormatVersion: 18
        style: file
        inplace: false
