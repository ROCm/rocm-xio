name: deb-build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      offload_arch:
        description: 'GPU offload architectures (semicolon-separated)'
        required: false
        default: 'gfx908:xnack+;gfx90a:xnack+;gfx942:xnack+;gfx950:xnack+;gfx1201'

permissions:
  contents: write

jobs:
  build-debs:
    name: Build .deb packages
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.2
      options: --user root
    env:
      LD_LIBRARY_PATH: /opt/rocm/lib:/usr/lib/x86_64-linux-gnu
      DEB_OFFLOAD_ARCH: ${{ inputs.offload_arch || 'gfx908:xnack+;gfx90a:xnack+;gfx942:xnack+;gfx950:xnack+;gfx1201' }}

    steps:
    - name: Check out code
      uses: actions/checkout@v5.0.0
      with:
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        apt-get update
        apt-get install -y devscripts equivs lsb-release python3-pip
        mk-build-deps --install --remove \
          --tool 'apt-get -y --no-install-recommends' \
          debian/control

    - name: Install rocm-kpack Python tools
      run: |
        pip install --break-system-packages \
          "rocm-kpack @ git+https://github.com/ROCm/rocm-kpack.git@main"

    - name: Generate debian/changelog
      run: debian/gen-changelog.sh

    - name: Show generated changelog
      run: cat debian/changelog

    - name: Build .deb packages
      run: dpkg-buildpackage -us -uc -b

    - name: List built packages
      run: |
        echo "=== Built .deb files ==="
        ls -lh ../*.deb
        echo ""
        echo "=== Package contents ==="
        for deb in ../*.deb; do
          echo "--- $(basename "$deb") ---"
          dpkg-deb -c "$deb"
          echo ""
        done

    - name: Upload .deb artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rocm-xio-debs-${{ github.sha }}
        path: |
          ../*.deb
          ../*.buildinfo
          ../*.changes

    - name: Stage release assets
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p /tmp/release-assets
        cp ../*.deb ../*.buildinfo ../*.changes /tmp/release-assets/

    - name: Update rolling latest pre-release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest development build
        body: |
          Rolling pre-release built from the latest commit on `main`.

          **Commit:** ${{ github.sha }}
          **Built:** ${{ github.event.head_commit.timestamp }}

          These packages are rebuilt on every push to `main` and may not
          be as stable as tagged releases. For production use, prefer a
          tagged `vX.Y.Z` release.
        prerelease: true
        make_latest: false
        files: /tmp/release-assets/*
