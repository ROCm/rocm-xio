name: scripts-check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - 'feat/**'
    paths:
      - 'scripts/**'
      - '.github/workflows/scripts-check.yml'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
    - name: Check out code.
      uses: actions/checkout@v5.0.0
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@2.0.0
      with:
        scandir: scripts
        severity: warning
        ignore_names: packages-rocm-xio-vm
      env:
        SHELLCHECK_OPTS: --exclude=SC2086
